name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dashboard test dependencies
        run: python -m pip install 'fastapi>=0.100,<1'
      - uses: oven-sh/setup-bun@v2
      - run: npm test
      - name: Pack and smoke npm runner
        shell: bash
        run: |
          tarball=$(npm pack --silent)
          npx --yes "./$tarball" -- --hermes-home "$RUNNER_TEMP/npx-hermes"
          test -f "$RUNNER_TEMP/npx-hermes/desktop-plugins/renderline/plugin.js"
          test -f "$RUNNER_TEMP/npx-hermes/skills/renderline/SKILL.md"
          test "$(sha256sum plugin.js | cut -d' ' -f1)" = "$(sha256sum "$RUNNER_TEMP/npx-hermes/desktop-plugins/renderline/plugin.js" | cut -d' ' -f1)"
          test "$(sha256sum skill/SKILL.md | cut -d' ' -f1)" = "$(sha256sum "$RUNNER_TEMP/npx-hermes/skills/renderline/SKILL.md" | cut -d' ' -f1)"
      - name: Smoke Bun runner
        shell: bash
        run: |
          tarball=$(ls renderline-*.tgz | head -1)
          bunx --package "$GITHUB_WORKSPACE/$tarball" renderline --hermes-home "$RUNNER_TEMP/bun-hermes"
          test -f "$RUNNER_TEMP/bun-hermes/desktop-plugins/renderline/plugin.js"
          test -f "$RUNNER_TEMP/bun-hermes/skills/renderline/SKILL.md"
          test "$(sha256sum plugin.js | cut -d' ' -f1)" = "$(sha256sum "$RUNNER_TEMP/bun-hermes/desktop-plugins/renderline/plugin.js" | cut -d' ' -f1)"
          test "$(sha256sum skill/SKILL.md | cut -d' ' -f1)" = "$(sha256sum "$RUNNER_TEMP/bun-hermes/skills/renderline/SKILL.md" | cut -d' ' -f1)"
